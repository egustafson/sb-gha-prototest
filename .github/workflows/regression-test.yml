name: Greet Module Regression Test

on:
  workflow_dispatch:
    inputs:
      revision:
        description: "Git tag or commit hash of sb-gha-protolib to test"
        required: true
        type: string
      python-version:
        description: "Python version to test"
        required: false
        default: "3.14"
        type: string
  workflow_call:
    inputs:
      revision:
        description: "Git tag or commit hash of sb-gha-protolib to test"
        required: true
        type: string
      python-version:
        description: "Python version to test"
        required: false
        default: "3.14"
        type: string

jobs:
  regression-test:
    name: Run Regression Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "sb-gha-protolib @ git+https://github.com/egustafson/sb-gha-protolib.git@${{ inputs.revision }}"

      - name: Run regression tests
        id: test
        run: python main.py
        continue-on-error: true

      - name: Report test results
        if: always()
        run: |
          if [ ${{ steps.test.outcome }} = "success" ]; then
            echo "✓ All regression tests passed!"
            exit 0
          else
            echo "✗ Regression tests failed!"
            exit 1
          fi

